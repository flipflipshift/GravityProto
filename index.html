<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gravity Explorer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    color: #ccc;
  }
  canvas {
    border: 1px solid #222;
    display: block;
  }
  #controls {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  #respawn {
    background: #00ffcc;
    color: #0a0a0f;
    border: none;
    padding: 8px 20px;
    font-family: inherit;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
  }
  #respawn:hover { background: #33ffd6; }
  #status {
    font-size: 14px;
    min-width: 260px;
  }
  #instructions {
    margin-top: 10px;
    max-width: 800px;
    text-align: center;
    font-size: 12px;
    color: #666;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <canvas id="canvas" width="800" height="600"></canvas>
  <div id="controls">
    <button id="respawn">Respawn</button>
    <span id="status">Orbiting...</span>
  </div>
  <div id="instructions">
    Arrow keys / WASD to thrust · Fuel recovers when not thrusting · Respawn on crash · Explore as far as you can
  </div>
  <script src="game.js"></script>
</body>
</html>
